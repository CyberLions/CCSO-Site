services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - NODE_ENV=development
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=ccso
      - DATABASE_USERNAME=ccso
      - DATABASE_PASSWORD=ccso
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=ccso
      - POSTGRES_USER=ccso
      - POSTGRES_PASSWORD=ccso
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccso -d ccso"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
